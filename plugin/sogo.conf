# The Displayname.
name=SOGo

# The application's service.
service=user_panel

# SOGo launcher bridge path in OLSPanel.
url=/3rdparty/sogo/auto_index.php
auto_login_url=/3rdparty/sogo/auto_index.php

# pass parameter with header
header[HTTP_AUTOLOGINUSER]=%email%
header[HTTP_AUTOLOGINPASS]=%email_password%

# System user and group to run process as
user=nobody
group=nogroup

# Features required
features=mail

# Media required
icon=/media/icon/sogo.svg

# Short
sorder=3
