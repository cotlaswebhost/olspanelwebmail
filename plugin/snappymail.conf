# The Displayname.
name=Snappymail

# The application's service.
service=user_panel

# Install path: /usr/local/olspanel/mypanel/3rdparty/snappymail/auto_index.php
url=/3rdparty/snappymail/auto_index.php
auto_login_url=/3rdparty/snappymail/auto_index.php

# pass parameter with header
header[HTTP_AUTOLOGINUSER]=%email%
header[HTTP_AUTOLOGINPASS]=%email_password%

# System user and group to run process as
user=$authuser
group=$authuser

# Features required
features=mail

# Media required
icon=/media/icon/snappymail.png

# Short
sorder=2
